<!DOCTYPE html>
<meta charset="UTF-8">
<title>管理后台</title>
<style>
*{box-sizing:border-box}
body{background:#f4f6f8;font-family:微软雅黑;padding:20px}
.box{max-width:500px;margin:30px auto;background:#fff;padding:25px;border-radius:16px}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd}
button{background:#2962ff;color:white;border:none}
.gray{background:#6c757d}
.center{text-align:center}
.green{color:green}
</style>

<div class="box" id="login">
  <h2>🔑 管理员登录</h2>
  <input type="password" id="pwd" placeholder="密码：123456">
  <div id="msg" class="red center"></div>
  <button onclick="login()">登录</button>
</div>

<div class="box" id="admin" style="display:none">
  <h2>📊 数据状态</h2>
  <div class="green center" id="info"></div>
  <button class="gray" onclick="refresh()">刷新状态</button>
  <button onclick="resetUsed()">清空已使用记录</button>
</div>

<script>
const PASSWORD = "123456";
const TXT_URL = "https://xiaoxinnb9898-bot.github.io/xiaoxin/data.txt";

let allData = [];
let usedData = JSON.parse(localStorage.getItem("used") || "[]");

async function loadData() {
  let res = await fetch(TXT_URL + "?t=" + Math.random());
  let text = await res.text();
  allData = text.split(/\n/).map(i => i.trim()).filter(i => i);
  refresh();
}

function login() {
  let p = document.getElementById("pwd").value;
  if (p === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    loadData();
  } else {
    document.getElementById("msg").innerText = "密码错误";
  }
}

function refresh() {
  let total = allData.length;
  let used = usedData.length;
  let remain = total - used;
  document.getElementById("info").innerText =
    `总数据：${total} 条 | 已用：${used} 条 | 剩余：${remain} 条`;
}

function resetUsed() {
  if (confirm("确定要清空已使用记录吗？")) {
    usedData = [];
    localStorage.setItem("used", JSON.stringify(usedData));
    refresh();
    alert("已重置");
  }
}
</script>
