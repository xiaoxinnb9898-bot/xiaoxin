<!DOCTYPE html>
<meta charset="UTF-8">
<title>管理后台</title>
<style>
*{box-sizing:border-box}
body{font-family:微软雅黑;background:#f4f6f8;margin:0;padding:20px}
.box{max-width:500px;margin:30px auto;background:#fff;padding:25px;border-radius:16px;box-shadow:0 2px 10px #00000010}
h2{text-align:center}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd}
button{background:#2962ff;color:white;border:none}
.gray{background:#6c757d}
.list{margin-top:20px;max-height:300px;overflow-y:auto}
.item{padding:10px;border-bottom:1px solid #eee}
.green{color:green}
.red{color:red}
.center{text-align:center}
</style>

<div class="box" id="login">
  <h2>🔑 管理员登录</h2>
  <input id="pwd" type="password" placeholder="密码：admin123">
  <div id="msg" class="center red"></div>
  <button onclick="login()">登录</button>
</div>

<div class="box" id="admin" style="display:none">
  <h2>⚙️ 卡密管理</h2>
  <input id="genNum" type="number" value="10" min="1" max="100">
  <button onclick="create()">生成卡密</button>
  <button class="gray" onclick="load()">刷新列表</button>
  <div class="center green" id="info"></div>
  <div class="list" id="list"></div>
</div>

<script>
const PASSWORD = "admin123";

function getKeys() { return JSON.parse(localStorage.getItem("sys_keys")||"[]") }
function getUsed() { return JSON.parse(localStorage.getItem("sys_used")||"[]") }
function getAll() { return JSON.parse(localStorage.getItem("sys_all")||"[]") }
function saveKeys(k) { localStorage.setItem("sys_keys",JSON.stringify(k)) }

function login() {
  const p = document.getElementById("pwd").value;
  if(p===PASSWORD){
    document.getElementById("login").style.display="none";
    document.getElementById("admin").style.display="block";
    load();
  }else{
    document.getElementById("msg").innerText="密码错误";
  }
}

function create() {
  const num = parseInt(document.getElementById("genNum").value)||1;
  const keys = getKeys();
  let newKeys = [];
  for(let i=0;i<num;i++){
    const k = Math.random().toString(36).slice(2,10).toUpperCase();
    keys.push({key:k,used:false});
    newKeys.push(k);
  }
  saveKeys(keys);
  alert("生成成功：\n"+newKeys.join("\n"));
  load();
}

function load() {
  const keys = getKeys();
  const all = getAll();
  const used = getUsed();
  const free = keys.filter(x=>!x.used).length;
  const usedCnt = keys.filter(x=>x.used).length;
  const remain = all.length - used.length;

  document.getElementById("info").innerText =
    `未使用：${free} | 已使用：${usedCnt} | 剩余数据：${remain}`;

  let html = "";
  keys.forEach(k=>{
    const s = k.used?"已使用":"未使用";
    html+=`<div class="item">${k.key} — ${s}</div>`;
  });
  document.getElementById("list").innerHTML = html;
}
</script>
