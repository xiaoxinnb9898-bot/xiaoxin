<!DOCTYPE html>
<meta charset="UTF-8">
<title>后台管理</title>
<style>
body{max-width:700px;margin:30px auto;padding:20px;font-family:微软雅黑;background:#f2f5f9}
.card{background:#fff;padding:25px;border-radius:16px;box-shadow:0 2px 10px #00000010;margin-bottom:15px}
input,button{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px;box-sizing:border-box}
button{background:#2962ff;color:white;border:0}
.item{padding:10px;border-bottom:1px solid #eee}
</style>

<div class="card" id="login">
  <h2>🔑 管理员登录</h2>
  <input id="pwd" type="password" placeholder="输入管理密码">
  <button onclick="login()">登录</button>
</div>

<div class="card" id="admin" style="display:none">
  <h2>⚙️ 管理后台</h2>
  <button onclick="createKey(10)">生成 10 个卡密</button>
  <button onclick="createKey(50)">生成 50 个卡密</button>
  <button onclick="createKey(100)">生成 100 个卡密</button>
  <button onclick="loadKeys()">刷新卡密列表</button>
  <div id="list"></div>
</div>

<script>
const API = "https://your-api-url.com";
let token = "";

async function login() {
  const pwd = document.getElementById("pwd").value;
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ pwd })
  });
  const data = await res.json();
  if (data.success) {
    token = data.token;
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    loadKeys();
  } else alert("密码错误");
}

async function createKey(num) {
  const res = await fetch(API + "/create", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ token, num })
  });
  const data = await res.json();
  alert("生成成功：" + data.keys.join("\n"));
  loadKeys();
}

async function loadKeys() {
  const res = await fetch(API + "/keys?token=" + token);
  const data = await res.json();
  let html = "";
  data.keys.forEach(k => {
    html += `<div class="item">${k.key} —— ${k.used?"已使用":"未使用"}</div>`;
  });
  document.getElementById("list").innerHTML = html;
}
</script>
