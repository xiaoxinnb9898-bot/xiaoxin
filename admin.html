<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>管理后台</title>
<style>
*{box-sizing:border-box}
body{font-family:微软雅黑;background:#f4f6f8;margin:0;padding:20px}
.box{max-width:600px;margin:30px auto;background:#fff;padding:25px;border-radius:16px;box-shadow:0 2px 10px #00000010}
h2{text-align:center}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd}
button{background:#2962ff;color:white;border:none;cursor:pointer}
.gray{background:#6c757d}
.list{margin-top:20px;max-height:400px;overflow-y:auto}
.item{padding:10px;border-bottom:1px solid #eee}
.green{color:green}
.red{color:red}
.center{text-align:center}
.hide{display:none}
</style>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="box" id="login">
  <h2>🔑 管理员登录</h2>
  <input id="a_pwd" type="password" placeholder="默认密码：admin123">
  <div id="a_msg" class="center red"></div>
  <button onclick="adminLogin()">登录</button>
</div>

<div class="box hide" id="admin_main">
  <h2>⚙️ 卡密管理</h2>
  <div class="input-group">
    <label>生成卡密数量</label>
    <input id="a_num" type="number" value="10" min="1" max="100">
  </div>
  <button onclick="adminCreate()">生成卡密</button>
  <button onclick="adminLoad()">刷新卡密列表</button>
  <div class="center green" id="a_info"></div>
  <div class="list" id="a_list"></div>
  <button class="gray" onclick="goUser()">返回用户页</button>
</div>

<div class="box hide" id="admin_error">
  <p class="center red">数据加载失败，请联系管理员</p>
</div>

<script>
const ADMIN_PWD = "admin123";
const DATA_URL = "https://xiaoxinnb9898-bot.github.io/xiaoxin/data.xlsx";
let allData = [];
let usedData = [];
let keys = [];

// 本地存储
function loadFromStorage() {
  const savedKeys = localStorage.getItem("sys_keys");
  const savedUsed = localStorage.getItem("sys_used");
  if(savedKeys) keys = JSON.parse(savedKeys);
  if(savedUsed) usedData = JSON.parse(savedUsed);
}
function saveToStorage() {
  localStorage.setItem("sys_keys", JSON.stringify(keys));
  localStorage.setItem("sys_used", JSON.stringify(usedData));
}

// 加载Excel
async function loadExcel() {
  try {
    const res = await fetch(DATA_URL + "?t=" + new Date().getTime(), {cache:"no-store"});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf);
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, {header:1, blankrows:true});
    
    allData = raw
      .map(r => r[0] === null || r[0] === undefined ? "" : String(r[0]).trim())
      .filter(c => c !== "")
      .filter((v,i,self) => self.indexOf(v)===i);
    
    return true;
  } catch (e) {
    console.error(e);
    return false;
  }
}

// 页面切换
function goUser() {
  window.open("https://xiaoxinnb9898-bot.github.io/xiaoxin/index.html", "_blank");
}

// 管理员登录
async function adminLogin() {
  const pwd = document.getElementById("a_pwd").value.trim();
  if(pwd !== ADMIN_PWD) {
    document.getElementById("a_msg").textContent = "密码错误";
    return;
  }

  loadFromStorage();
  const loadSuccess = await loadExcel();
  if(!loadSuccess) {
    document.getElementById("login").classList.add("hide");
    document.getElementById("admin_error").classList.remove("hide");
    return;
  }

  document.getElementById("login").classList.add("hide");
  document.getElementById("admin_main").classList.remove("hide");
  adminLoad();
}

// 生成卡密
function adminCreate() {
  const num = parseInt(document.getElementById("a_num").value) || 10;
  let newKeys = [];
  for(let i=0;i<num;i++) {
    const key = "KEY" + Math.random().toString(36).slice(2,10).toUpperCase();
    keys.push({key, used:false});
    newKeys.push(key);
  }
  saveToStorage();
  alert(`✅ 生成成功！\n${newKeys.join("\n")}`);
  adminLoad();
}

// 加载卡密列表
function adminLoad() {
  const free = keys.filter(k => !k.used).length;
  const used = keys.filter(k => k.used).length;
  const remain = allData.length - usedData.length;

  document.getElementById("a_info").textContent = 
    `未使用卡密：${free} | 已使用卡密：${used} | 剩余数据：${remain}条`;

  let html = "";
  keys.forEach(k => {
    const status = k.used ? "✅ 已使用" : "🟢 未使用";
    html += `<div class="item">${k.key} —— ${status}</div>`;
  });
  document.getElementById("a_list").innerHTML = html;
}
</script>
</body>
</html>
