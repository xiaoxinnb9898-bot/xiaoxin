<!DOCTYPE html>
<meta charset="UTF-8">
<title>管理后台</title>
<style>
*{box-sizing:border-box}
body{font-family:微软雅黑;background:#f4f6f8;margin:0;padding:20px}
.box{max-width:600px;margin:30px auto;background:#fff;padding:25px;border-radius:16px;box-shadow:0 2px 10px #00000010}
h2{text-align:center}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd}
button{background:#2962ff;color:white;border:none;cursor:pointer}
.gray{background:#6c757d}
.list{margin-top:20px;max-height:400px;overflow-y:auto}
.item{padding:10px;border-bottom:1px solid #eee}
.green{color:green}
.red{color:red}
.center{text-align:center}
</style>

<div class="box" id="login">
  <h2>🔑 管理员登录</h2>
  <input id="pwd" type="password" placeholder="密码：admin123">
  <div id="msg" class="center red"></div>
  <button onclick="login()">登录</button>
</div>

<div class="box" id="admin" style="display:none">
  <h2>⚙️ 卡密管理</h2>
  <input id="genNum" type="number" value="10" min="1" max="100">
  <button onclick="create()">生成卡密</button>
  <button onclick="load()">刷新列表</button>
  <div class="center green" id="info"></div>
  <div class="list" id="list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
const PASSWORD = "admin123";
const DATA_URL = "https://xiaoxinnb9898-bot.github.io/xiaoxin/数据.xlsx";
let allData = [];
let usedData = [];
let keys = [];

function loadFromStorage() {
  const savedKeys = localStorage.getItem("sys_keys");
  const savedUsed = localStorage.getItem("sys_used");
  if(savedKeys) keys = JSON.parse(savedKeys);
  if(savedUsed) usedData = JSON.parse(savedUsed);
}

function saveToStorage() {
  localStorage.setItem("sys_keys", JSON.stringify(keys));
  localStorage.setItem("sys_used", JSON.stringify(usedData));
}

async function loadExcel() {
  try {
    const res = await fetch(DATA_URL + "?t=" + new Date().getTime(), {cache:"no-store"});
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf);
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, {header:1, blankrows:true});
    
    allData = raw
      .map(r => r[0] === null || r[0] === undefined ? "" : String(r[0]).trim())
      .filter(c => c !== "")
      .filter((v, i, self) => self.indexOf(v) === i);
  } catch (e) {
    console.error("数据加载失败", e);
  }
}

loadFromStorage();
loadExcel();

function login() {
  const p = document.getElementById("pwd").value.trim();
  if(p === PASSWORD){
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    load();
  }else{
    document.getElementById("msg").innerText = "密码错误";
  }
}

function create() {
  const num = parseInt(document.getElementById("genNum").value)||1;
  let newKeys = [];
  for(let i=0;i<num;i++){
    const k = Math.random().toString(36).slice(2,10).toUpperCase();
    keys.push({key:k, used:false});
    newKeys.push(k);
  }
  saveToStorage();
  alert(`✅ 生成成功！\n${newKeys.join("\n")}`);
  load();
}

function load() {
  const free = keys.filter(k => !k.used).length;
  const used = keys.filter(k => k.used).length;
  const remain = allData.length - usedData.length;

  document.getElementById("info").innerText =
    `未使用卡密：${free} | 已使用卡密：${used} | 剩余数据：${remain}条`;

  let html = "";
  keys.forEach(k => {
    const status = k.used ? "✅ 已使用" : "🟢 未使用";
    html += `<div class="item">${k.key} —— ${status}</div>`;
  });
  document.getElementById("list").innerHTML = html;
}
</script>
