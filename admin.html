<!DOCTYPE html>
<meta charset="UTF-8">
<title>管理后台</title>
<style>
*{box-sizing:border-box}
body{background:#f5f7fa;padding:20px;font-family:微软雅黑}
.box{max-width:700px;margin:40px auto;background:#fff;padding:30px;border-radius:20px}
input,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #ddd}
button{background:#007bff;color:white;cursor:pointer;border:none}
.danger{background:#dc3545}
.download{background:#28a745}
.logs{max-height:240px;overflow-y:auto;margin:10px 0}
.item{padding:10px;border-bottom:1px solid #eee}
.center{text-align:center}
.red{color:red}
.green{color:green}
.current-pwd{font-size:24px;padding:16px;background:#d1f7e2;border-radius:12px;text-align:center;font-weight:bold}
</style>

<div id="login" class="box">
  <h2>🔑 管理员登录</h2>
  <p class="center">当前动态密码：<b id="showPwd"></b></p>
  <input type="password" id="pwd" placeholder="请输入动态密码">
  <div id="msg" class="red center"></div>
  <button onclick="login()">登录</button>
</div>

<div id="admin" class="box" style="display:none">
  <h2>📊 管理后台</h2>
  <h3>🔐 当前动态密码</h3>
  <div class="current-pwd" id="currentPwd"></div>

  <h3>🎁 提取码记录（谁领了什么卡密）</h3>
  <div class="logs" id="keyLogs"></div>

  <h3>📥 数据提取记录（谁提取了数据）</h3>
  <div class="logs" id="dataLogs"></div>

  <button onclick="loadAll()">🔄 刷新记录</button>
  <button class="danger" onclick="resetAll()">清空所有数据</button>
</div>

<script>
const GIST_ID = "2f260b4654ae345630ef14017f240703";
const PASSWORD = "123456"; // 后台登录密码

// 动态密码（每分钟刷新）
function getDynamicPwd() {
  const now = new Date();
  const m = now.getMinutes().toString().padStart(2, '0');
  return `XIN${m}NB`;
}

// 页面加载显示当前密码
window.onload = function() {
  document.getElementById('showPwd').innerText = getDynamicPwd();
};

// 登录逻辑
function login() {
  const input = document.getElementById('pwd').value.trim();
  const real = getDynamicPwd();
  const msg = document.getElementById('msg');

  if (input === real) {
    localStorage.setItem('login_error', 0); // 重置错误计数
    document.getElementById('login').style.display = 'none';
    document.getElementById('admin').style.display = 'block';
    setInterval(() => {
      document.getElementById('currentPwd').innerText = getDynamicPwd();
    }, 1000);
    loadAll(); // 加载数据
    setInterval(loadAll, 5000); // 每5秒自动刷新
  } else {
    let count = parseInt(localStorage.getItem('login_error') || 0) + 1;
    localStorage.setItem('login_error', count);
    msg.innerText = "❌ 动态密码错误！";
  }
}

// 加载所有数据
async function loadAll() {
  try {
    let res = await fetch(`https://gist.githubusercontent.com/xiaoxinnb9898-bot/${GIST_ID}/raw/data.json?t=${Date.now()}`);
    let text = await res.text();
    let data = JSON.parse(text);
    
    showKeys(data.keys || []);      // 渲染领码记录
    showLogs(data.logs || []);      // 渲染提取记录
  } catch (e) {
    console.error("读取数据失败", e);
  }
}

// 显示提取码记录（谁领了什么卡密）
function showKeys(keys) {
  let html = '';
  if (keys.length === 0) {
    document.getElementById('keyLogs').innerHTML = "<div class='item'>暂无记录</div>";
    return;
  }

  keys.forEach(k => {
    const status = k.used ? "✅ 已使用" : "🆓 未使用";
    // 显示：时间 + 姓名 + 卡密 + 额度 + 状态
    html += `<div class='item'>
      ${k.time}<br>
     👤 ${k.name} | 🎁 ${k.key} (${k.limit}条) [${status}]
    </div>`;
  });
  document.getElementById('keyLogs').innerHTML = html;
}

// 显示数据提取记录（谁提取了数据）
function showLogs(logs) {
  let html = '';
  if (logs.length === 0) {
    document.getElementById('dataLogs').innerHTML = "<div class='item'>暂无记录</div>";
    return;
  }

  logs.forEach((l, i) => {
    // 显示：时间 + 姓名 + 卡密 + 提取条数 + 下载按钮
    html += `<div class='item'>
      ${l.time}<br>
      👤 ${l.name} | 🎁 卡密：${l.key} | 📊 提取：${l.count || 0}条
      <button class='download' onclick='downloadData(${i})'>下载原始数据</button>
    </div>`;
  });
  document.getElementById('dataLogs').innerHTML = html;
}

// 下载用户提取的数据
async function downloadData(index) {
  try {
    let res = await fetch(`https://gist.githubusercontent.com/xiaoxinnb9898-bot/${GIST_ID}/raw/data.json?t=${Date.now()}`);
    let data = JSON.parse(await res.text());
    let log = data.logs[index];
    
    if (!log) return;
    
    const blob = new Blob([log.data || ""], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${log.name}_${log.key}.txt`;
    a.click();
  } catch (e) {}
}

// 清空所有数据（谨慎操作）
async function resetAll() {
  if (!confirm("确定要清空所有记录吗？此操作不可恢复！")) return;
  
  const emptyData = { keys: [], logs: [] };
  await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: "PATCH",
    headers: { "Authorization": `token ${GIST_TOKEN}`, "Content-Type": "application/json" },
    body: JSON.stringify({ files: { "data.json": { content: JSON.stringify(emptyData, null, 2) } } })
  });
  
  loadAll();
  alert("✅ 已清空所有数据！");
}
</script>
