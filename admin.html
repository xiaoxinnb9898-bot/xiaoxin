<!DOCTYPE html>
<meta charset="UTF-8">
<title>管理后台</title>
<style>
*{box-sizing:border-box}
body{background:#f5f7fa;padding:20px;font-family:微软雅黑}
.box{max-width:700px;margin:40px auto;background:#fff;padding:30px;border-radius:20px}
input,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #ddd}
button{background:#007bff;color:white;cursor:pointer;border:none}
.danger{background:#dc3545}
.download{background:#28a745}
.logs{max-height:240px;overflow-y:auto;margin:10px 0}
.item{padding:10px;border-bottom:1px solid #eee}
.center{text-align:center}
.red{color:red}
.green{color:green}
.current-pwd{font-size:24px;padding:16px;background:#d1f7e2;border-radius:12px;text-align:center;font-weight:bold}
.lock{color:#ff4444;font-weight:bold;font-size:18px}
</style>

<div id="login" class="box">
  <h2>🔑 管理员登录</h2>
  <p class="center">当前动态密码：<b id="showPwd"></b></p>
  <input type="password" id="pwd" placeholder="请输入动态密码">
  <div id="msg" class="red center"></div>
  <button onclick="login()">登录</button>
</div>

<div id="admin" class="box" style="display:none">
  <h2>📊 管理后台</h2>
  <h3>🔐 当前动态密码</h3>
  <div class="current-pwd" id="currentPwd"></div>

  <h3>🎁 提取码记录</h3>
  <div class="logs" id="keyLogs"></div>

  <h3>📥 数据提取记录</h3>
  <div class="logs" id="dataLogs"></div>

  <button onclick="loadAll()">🔄 刷新记录</button>
  <button class="danger" onclick="resetAll()">清空所有数据</button>
</div>

<script>
const GIST_ID = "2f260b4654ae345630ef140703";
const GIST_TOKEN = "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";

// ==============================================
// 安全设置：3次错误锁定IP
// ==============================================
const MAX_ERROR = 3;
let errorCount = parseInt(localStorage.getItem('login_error')) || 0;
let isLocked = localStorage.getItem('is_locked') === 'true';

// 获取真实IP（简单版）
async function getIP() {
  try {
    let res = await fetch('https://api.ipify.org?format=json');
    let data = await res.json();
    return data.ip;
  } catch (e) {
    return 'unknown';
  }
}

// 动态密码
function getDynamicKey() {
  const now = new Date();
  const mm = now.getMinutes().toString().padStart(2, '0');
  return `XIN${mm}NB`;
}

// 页面加载判断是否锁定
window.onload = async function() {
  document.getElementById('showPwd').innerText = getDynamicKey();
  
  if (isLocked) {
    let ip = await getIP();
    document.getElementById('msg').innerText = `🔒 你的IP(${ip})已锁定，连续错误超过${MAX_ERROR}次`;
    document.getElementById('msg').className = 'center lock';
    document.querySelector('button').disabled = true;
    return;
  }
}

// 登录逻辑
async function login() {
  if (isLocked) return;

  let input = document.getElementById('pwd').value.trim();
  let real = getDynamicKey();
  let msg = document.getElementById('msg');

  if (input === real) {
    // 登录成功，清空错误
    localStorage.setItem('login_error', 0);
    document.getElementById('login').style.display = 'none';
    document.getElementById('admin').style.display = 'block';
    setInterval(() => {
      document.getElementById('currentPwd').innerText = getDynamicKey();
    }, 1000);
    loadAll();
    setInterval(loadAll, 5000);
  } else {
    errorCount++;
    localStorage.setItem('login_error', errorCount);

    if (errorCount >= MAX_ERROR) {
      localStorage.setItem('is_locked', 'true');
      let ip = await getIP();
      msg.innerText = `🔒 你的IP(${ip})已被锁定！`;
      msg.className = 'center lock';
      document.querySelector('button').disabled = true;
    } else {
      msg.innerText = `❌ 密码错误，剩余 ${MAX_ERROR - errorCount} 次机会`;
    }
  }
}

// ==============================================
// 后台数据加载
// ==============================================
async function loadAll() {
  try {
    let res = await fetch(`https://gist.githubusercontent.com/xiaoxinnb9898-bot/${GIST_ID}/raw/data.json?t=${Date.now()}`);
    let text = await res.text();
    let data = JSON.parse(text);
    showKeys(data.keys || []);
    showLogs(data.logs || []);
  } catch (e) {}
}

function showKeys(keys) {
  let html = '';
  keys.forEach(k => {
    let status = k.used ? '✅ 已使用' : '🆓 未使用';
    html += `<div class='item'>${k.time}<br>${k.name} → ${k.key} (${status})</div>`;
  });
  document.getElementById('keyLogs').innerHTML = html || '<div class="item">暂无记录</div>';
}

function showLogs(logs) {
  let html = '';
  logs.forEach((l, i) => {
    html += `
    <div class='item'>
      ${l.time}<br>${l.name} | 卡密：${l.key || ''} | ${l.limit || l.count || 0}条
      <button class='download' onclick='download(${i})'>下载</button>
    </div>`;
  });
  document.getElementById('dataLogs').innerHTML = html || '<div class="item">暂无记录</div>';
}

async function download(i) {
  let res = await fetch(`https://gist.githubusercontent.com/xiaoxinnb9898-bot/${GIST_ID}/raw/data.json?t=${Date.now()}`);
  let text = await res.text();
  let data = JSON.parse(text);
  let log = data.logs[i];
  let blob = new Blob([log.data], { type: 'text/plain;charset=utf-8' });
  let a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = log.name + '.txt';
  a.click();
}

async function resetAll() {
  if (!confirm('确定清空所有记录？不可恢复！')) return;
  let empty = { keys: [], logs: [] };
  await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: 'PATCH',
    headers: {
      'Authorization': 'token ' + GIST_TOKEN,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      files: { 'data.json': { content: JSON.stringify(empty, null, 2) } }
    })
  });
  loadAll();
  alert('✅ 已清空');
}
</script>
