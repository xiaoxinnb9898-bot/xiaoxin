<!DOCTYPE html>
<meta charset="UTF-8">
<title>管理后台</title>
<style>
*{box-sizing:border-box}
body{background:#f5f7fa;font-family:微软雅黑;padding:20px}
.box{max-width:700px;margin:40px auto;background:#fff;padding:30px;border-radius:20px}
input,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #ddd}
button{background:#007bff;color:white;cursor:pointer;border:none}
.btn-refresh{background:#007bff !important;} /* 蓝色刷新按钮 */
.btn-danger{background:#dc3545 !important;}
.btn-download{background:#28a745 !important;}
.logs{max-height:240px;overflow-y:auto;margin:10px 0}
.item{padding:10px;border-bottom:1px solid #eee}
.center{text-align:center}
.red{color:red}
.green{color:green}
.current-pwd{font-size:24px;padding:16px;background:#d1f7e2;border-radius:12px;text-align:center;font-weight:bold;color:#000}
</style>

<div id="login" class="box">
  <h2>🔑 管理员登录</h2>
  <input type="password" id="pwd" placeholder="密码：123456">
  <div id="msg" class="red center"></div>
  <button onclick="login()">登录</button>
</div>

<div id="admin" class="box" style="display:none">
  <h2>📊 管理后台</h2>
  
  <div style="display:flex;align-items:center;gap:10px">
    <span>🔐 当前动态密码（每分钟自动刷新）：</span>
    <div class="current-pwd" id="currentPwd"></div>
  </div>

  <h3>🎁 提取码领取记录</h3>
  <div class="logs" id="keyLogs"></div>

  <h3>📥 数据提取记录</h3>
  <div class="logs" id="dataLogs"></div>

  <!-- 修复这里：onclick 直接绑定 loadAll() -->
  <button class="btn-refresh" onclick="loadAll()">🔄 立即刷新所有记录</button>
  <button class="btn-danger" onclick="resetAll()">清空所有数据</button>
</div>

<script>
const PASSWORD = "123456";

function getDynamicKey() {
  let now = new Date();
  let mm = now.getMinutes();
  let key = "XIN"+mm+"NB";
  return key.toUpperCase();
}

function showPwd() {
  document.getElementById("currentPwd").innerText = getDynamicKey();
}

function login() {
  if (document.getElementById("pwd").value === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    
    // 每1秒刷新一次密码
    setInterval(showPwd, 1000);
    // 每3秒自动刷新记录（后台不需要手动点）
    setInterval(loadAll, 3000);
    loadAll();
  } else {
    document.getElementById("msg").innerText = "密码错误";
  }
}

function loadAll() {
  showPwd();
  showKeys();
  showDataLogs();
}

function showKeys() {
  let keys = JSON.parse(localStorage.getItem("ALL_KEYS") || "[]");
  let html = "";
  keys.forEach(k => {
    let status = k.used ? "✅ 已使用" : "🆓 未使用";
    html += `<div class="item">${k.time}<br>${k.name} → ${k.key} (${status})</div>`;
  });
  document.getElementById("keyLogs").innerHTML = html || "<div class='item'>暂无记录</div>";
}

function showDataLogs() {
  let logs = JSON.parse(localStorage.getItem("LOGS") || "[]");
  let html = "";
  logs.forEach((l,i) => {
    html += `
    <div class="item">
      ${l.time}<br>${l.name} 领取 ${l.count} 条
      <button class="btn-download" onclick="down(${i})">下载数据</button>
    </div>`;
  });
  document.getElementById("dataLogs").innerHTML = html || "<div class='item'>暂无记录</div>";
}

function down(i) {
  let logs = JSON.parse(localStorage.getItem("LOGS"));
  let b = new Blob([logs[i].data],{type:"text/plain;charset=utf-8"});
  let a = document.createElement("a");
  a.href=URL.createObjectURL(b);
  a.download=logs[i].name+"_备份数据.txt";
  a.click();
}

function resetAll() {
  if(confirm("确定清空所有记录？此操作不可恢复！")){
    localStorage.clear();
    loadAll();
    alert("✅ 已清空所有数据");
  }
}
</script>
