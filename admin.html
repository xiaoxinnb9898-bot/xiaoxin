<!DOCTYPE html>
<meta charset="UTF-8">
<title>管理后台</title>
<style>
*{box-sizing:border-box}
body{background:#f5f7fa;font-family:微软雅黑;padding:20px}
.box{max-width:700px;margin:40px auto;background:#fff;padding:30px;border-radius:20px}
input,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #ddd}
button{background:#007bff;color:white;cursor:pointer;border:none}
.danger{background:#dc3545}
.download{background:#28a745}
.logs{max-height:240px;overflow-y:auto;margin:10px 0}
.item{padding:10px;border-bottom:1px solid #eee}
.center{text-align:center}
.red{color:red}
.green{color:green}
.current-pwd{font-size:24px;padding:16px;background:#d1f7e2;border-radius:12px;text-align:center;font-weight:bold;color:#000}
</style>

<div id="login" class="box">
  <h2>🔑 管理员登录</h2>
  <input type="password" id="pwd" placeholder="密码：123456">
  <div id="msg" class="red center"></div>
  <button onclick="login()">登录</button>
</div>

<div id="admin" class="box" style="display:none">
  <h2>📊 管理后台</h2>
  
  <h3>🔐 当前动态密码（每分钟自动刷新）</h3>
  <div class="current-pwd" id="currentPwd"></div>

  <h3>🎁 提取码领取记录</h3>
  <div class="logs" id="keyLogs"></div>

  <h3>📥 数据提取记录</h3>
  <div class="logs" id="dataLogs"></div>

  <button onclick="loadAll()">🔄 立即刷新所有记录</button>
  <button class="danger" onclick="resetAll()">清空所有数据</button>
</div>

<script>
const GIST_ID = "2f260b4654ae345630ef14017f240703";
const GIST_TOKEN = "2f260b4654ae345630ef14017f240703";
const PASSWORD = "123456";
const JSON_URL = `https://gist.githubusercontent.com/xiaoxinnb9898-bot/${GIST_ID}/raw/data.json?t=${Date.now()}`;

function getDynamicKey() {
  let now = new Date();
  let mm = now.getMinutes();
  return `XIN${mm}NB`.toUpperCase();
}

function showPwd() {
  document.getElementById("currentPwd").innerText = getDynamicKey();
}

function login() {
  if (document.getElementById("pwd").value === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("admin").style.display = "block";
    setInterval(showPwd, 1000);
    setInterval(loadAll, 3000);
    loadAll();
  } else {
    document.getElementById("msg").innerText = "密码错误";
  }
}

async function loadAll() {
  showPwd();
  let res = await fetch(JSON_URL, { cache: "no-store" });
  let data = await res.json();
  showKeys(data.keys || []);
  showDataLogs(data.logs || []);
}

function showKeys(keys) {
  let html = "";
  keys.forEach(k => {
    let status = k.used ? "✅ 已使用" : "🆓 未使用";
    html += `<div class="item">${k.time}<br>${k.name} → ${k.key} (${status})</div>`;
  });
  document.getElementById("keyLogs").innerHTML = html || "<div class='item'>暂无记录</div>";
}

function showDataLogs(logs) {
  let html = "";
  logs.forEach((l, i) => {
    html += `
    <div class="item">
      ${l.time}<br>${l.name} 领取 ${l.count} 条
      <button class="download" onclick="downloadData(${i})">下载数据</button>
    </div>`;
  });
  document.getElementById("dataLogs").innerHTML = html || "<div class='item'>暂无记录</div>";
}

function downloadData(index) {
  fetch(JSON_URL + "?t=" + Date.now(), { cache: "no-store" })
    .then(res => res.json())
    .then(data => {
      let log = (data.logs || [])[index];
      if (!log) return;
      let b = new Blob([log.data || ""], { type: "text/plain;charset=utf-8" });
      let a = document.createElement("a");
      a.href = URL.createObjectURL(b);
      a.download = `${log.name}_${log.time.replace(/[\/:\s]/g, "_")}.txt`;
      a.click();
    });
}

async function resetAll() {
  if (!confirm("确定清空所有记录？不可恢复！")) return;
  let data = { keys: [], logs: [], dynamicPwd: "" };
  await saveJson(data);
  loadAll();
  alert("✅ 已清空");
}

async function saveJson(data) {
  return await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: "PATCH",
    headers: {
      "Authorization": `token ${GIST_TOKEN}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      files: {
        "data.json": { content: JSON.stringify(data, null, 2) }
      }
    })
  });
}
</script>
