<!DOCTYPE html>
<meta charset="UTF-8">
<title>免费领取提取码</title>
<style>
*{box-sizing:border-box}
body{background:#f5f7fa;font-family:微软雅黑;padding:20px}
.box{max-width:500px;margin:50px auto;background:#fff;padding:30px;border-radius:20px}
input,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #ddd}
button{background:#007bff;color:white;border:none}
.btn-admin{background:#ff7043 !important;}
.btn-channel{background:#9c27b0 !important;}
.center{text-align:center}
.red{color:red}
.green{color:green}
.code{font-size:22px;padding:14px;background:#e3f2fd;border-radius:12px;text-align:center;font-weight:bold;margin:10px 0}
</style>

<div class="box">
  <h2 class="center">🎁 免费领取提取码</h2>
  <input id="name" placeholder="请输入你的名字">
  <input id="pwd" placeholder="请输入当前动态密码">
  <button onclick="getKey()">立即领取</button>
  <div id="msg" class="center"></div>
  <div id="codeArea" class="hide code"></div>

  <button class="btn-admin" onclick="window.open('https://t.me/XIAOXINOOO2','_blank')">📞 联系管理员小新</button>
  <button class="btn-channel" onclick="window.open('https://t.me/vip98886888','_blank')">📢 官方飞机频道</button>
</div>

<script>
const JSON_URL = "https://xiaoxinnb9898-bot.github.io/xiaoxin/data.json";
const GIST_ID = "YOUR_GIST_ID";
const GIST_TOKEN = "YOUR_GIST_TOKEN";

// 生成动态密码（全网统一，每分钟更新）
function getDynamicKey() {
  let now = new Date();
  let mm = now.getMinutes();
  return `XIN${mm}NB`.toUpperCase();
}

// 领取提取码
async function getKey() {
  let name = document.getElementById("name").value.trim();
  let pwd = document.getElementById("pwd").value.trim().toUpperCase();
  let msg = document.getElementById("msg");
  let codeArea = document.getElementById("codeArea");

  if (!name) { msg.className = "red"; msg.innerText = "请输入名字"; return; }
  if (!pwd) { msg.className = "red"; msg.innerText = "请输入动态密码"; return; }

  let realPwd = getDynamicKey();
  if (pwd !== realPwd) {
    msg.className = "red"; msg.innerText = "❌ 动态密码错误！每分钟更新一次"; return;
  }

  // 生成提取码
  let key = Math.random().toString(36).substr(2,6).toUpperCase();
  
  // 读取JSON
  let res = await fetch(JSON_URL+"?t="+Math.random());
  let data = await res.json();
  data.keys.push({
    name: name,
    key: key,
    time: new Date().toLocaleString(),
    used: false
  });

  // 写回JSON
  await saveJson(data);

  codeArea.innerText = "你的提取码：" + key;
  codeArea.classList.remove("hide");
  msg.className = "green"; msg.innerText = "✅ 领取成功！去首页提取数据";
}

// 保存JSON
async function saveJson(data){
  await fetch(`https://api.github.com/gists/${GIST_ID}`, {
    method: "PATCH",
    headers: {
      "Authorization": `token ${GIST_TOKEN}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      files: {
        "data.json": {
          content: JSON.stringify(data, null, 2)
        }
      }
    })
  });
}
</script>
