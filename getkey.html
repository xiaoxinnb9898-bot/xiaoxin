// 动态密码
function getDynamicPwd() {
  const now = new Date();
  const mm = now.getMinutes().toString().padStart(2, '0');
  return `XIN${mm}NB`;
}

// 保存数据到Gist
async function saveToGist(data) {
  try {
    await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: "PATCH",
      headers: {
        "Authorization": `token ${GIST_TOKEN}`,
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({ files: { "data.json": { content: JSON.stringify(data, null, 2) } } })
    });
  } catch (e) {console.log("Gist同步失败，本地已保存：", e);}
}

// 领取卡密核心逻辑
async function getCard() {
  const name = document.getElementById("name").value.trim();
  const pwd = document.getElementById("pwd").value.trim();
  const msg = document.getElementById("msg");
  const codeBox = document.getElementById("codeBox");

  // 基础校验
  if (!name) { msg.className = "msg red"; msg.innerText = "❌ 请输入你的名字"; return; }
  if (!pwd) { msg.className = "msg red"; msg.innerText = "❌ 请输入动态密码"; return; }
  if (pwd !== getDynamicPwd()) { msg.className = "msg red"; msg.innerText = "❌ 动态密码错误！"; return; }

  try {
    // 1. 读取现有数据（云端+本地）
    let data = { keys: [], logs: [] };
    const localStr = localStorage.getItem(STORAGE_KEY);
    if (localStr) data = JSON.parse(localStr);
    // 过滤已使用/已领取的卡密
    const usedCodes = new Set([...data.keys.map(k=>k.key), ...data.logs.map(l=>l.key)]);
    const availableCodes = KAMI_POOL.filter(c => !usedCodes.has(c));

    if (availableCodes.length === 0) {
      msg.className = "msg red"; msg.innerText = "❌ 今日卡密已全部领完！";
      return;
    }

    // 2. 随机选择可用卡密
    const randomCode = availableCodes[Math.floor(Math.random() * availableCodes.length)];
    // 3. 添加领取记录
    data.keys.push({
      name: name,
      key: randomCode,
      limit: 300,
      time: new Date().toLocaleString(),
      used: false
    });

    // 4. 双存储：本地+云端
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    await saveToGist(data);

    // 5. 显示领取成功
    codeBox.innerText = `${randomCode}（可提取300条数据）`;
    codeBox.style.display = "block";
    msg.className = "msg green";
    msg.innerText = "✅ 卡密领取成功！复制去提取数据";

  } catch (e) {
    msg.className = "msg red"; msg.innerText = "❌ 领取失败，请刷新重试";
    console.error(e);
  }
}
