<!DOCTYPE html>
<meta charset="UTF-8">
<title>免费领取提取码</title>
<style>
*{box-sizing:border-box}
body{background:#f5f7fa;font-family:微软雅黑;padding:20px}
.box{max-width:500px;margin:50px auto;background:#fff;padding:30px;border-radius:20px}
input,button{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #ddd}
button{background:#007bff;color:white;border:none;cursor:pointer}
.btn-admin{background:#ff7043 !important;}
.btn-channel{background:#9c27b0 !important;}
.center{text-align:center}
.red{color:red}
.green{color:green}
.code{font-size:22px;padding:14px;background:#e3f2fd;border-radius:12px;text-align:center;font-weight:bold;margin:10px 0}
</style>

<div class="box">
  <h2 class="center">🎁 免费领取提取码</h2>
  <input id="name" placeholder="请输入你的名字" value="欣欣">
  <input id="pwd" placeholder="请输入当前动态密码" value="XIN58NB">
  <button onclick="getKey()">立即领取</button>
  <div id="msg" class="center"></div>
  <div id="codeArea" class="hide code"></div>

  <button class="btn-admin" onclick="window.open('https://t.me/XIAOXINOOO2','_blank')">📞 联系管理员小新</button>
  <button class="btn-channel" onclick="window.open('https://t.me/vip98886888','_blank')">📢 官方飞机频道</button>
</div>

<script>
const GIST_ID = "2f260b4654ae345630ef14017f240703";
const GIST_TOKEN = "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";
const JSON_URL = `https://gist.githubusercontent.com/xiaoxinnb9898-bot/${GIST_ID}/raw/data.json?t=${Date.now()}`;

// 生成6位大写提取码
function generateKey() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let key = '';
  for (let i = 0; i < 6; i++) {
    key += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return key;
}

// 动态密码
function getDynamicKey() {
  const now = new Date();
  const mm = now.getMinutes().toString().padStart(2, '0');
  return `XIN${mm}NB`;
}

async function getKey() {
  const name = document.getElementById("name").value.trim();
  const pwd = document.getElementById("pwd").value.trim().toUpperCase();
  const msg = document.getElementById("msg");
  const codeArea = document.getElementById("codeArea");

  // 基础校验
  if (!name) { msg.className = "red"; msg.innerText = "❌ 请输入名字"; return; }
  if (!pwd) { msg.className = "red"; msg.innerText = "❌ 请输入动态密码"; return; }

  // 验证动态密码
  const realPwd = getDynamicKey();
  if (pwd !== realPwd) {
    msg.className = "red"; msg.innerText = "❌ 动态密码错误！当前正确密码：" + realPwd; return;
  }

  const key = generateKey();

  try {
    // 1. 强制拉取最新Gist数据，禁用缓存
    const res = await fetch(JSON_URL, { 
      cache: "no-store",
      mode: "cors",
      headers: { "Accept": "application/json" }
    });

    if (!res.ok) throw new Error("Gist读取失败：" + res.statusText);
    const data = await res.json();
    data.keys = data.keys || [];

    // 2. 添加新提取码
    data.keys.push({
      name: name,
      key: key,
      time: new Date().toLocaleString(),
      used: false
    });

    // 3. 强制写回Gist，带详细错误处理
    const saveRes = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: "PATCH",
      mode: "cors",
      headers: {
        "Authorization": `token ${GIST_TOKEN}`,
        "Content-Type": "application/json",
        "Accept": "application/vnd.github.v3+json"
      },
      body: JSON.stringify({
        files: {
          "data.json": { content: JSON.stringify(data, null, 2) }
        }
      })
    });

    if (!saveRes.ok) {
      const errData = await saveRes.json();
      throw new Error(`Gist写入失败：${saveRes.status} ${errData.message || "权限不足"}`);
    }

    // 4. 写入成功，显示提取码
    codeArea.innerText = `✅ 你的提取码：${key}`;
    codeArea.classList.remove("hide");
    msg.className = "green";
    msg.innerText = "✅ 领取成功！复制去提取数据";
  } catch (err) {
    msg.className = "red";
    msg.innerText = `❌ 提取码生成失败：${err.message}`;
    console.error("详细错误：", err);
  }
}
</script>
