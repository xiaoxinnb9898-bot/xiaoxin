<!DOCTYPE html>
<meta charset="UTF-8">
<title>数据提取系统</title>
<style>
body{max-width:600px;margin:50px auto;padding:30px;font-family:微软雅黑;background:#f4f6f8}
.card{background:#fff;padding:30px;border-radius:16px;box-shadow:0 2px 15px rgba(0,0,0,0.08)}
h2{color:#333;margin-top:0;text-align:center}
.input-group{margin:12px 0}
input{padding:10px 14px;border-radius:6px;border:1px solid #ddd;font-size:15px;width:100%;box-sizing:border-box}
button{padding:10px 14px;background:#007bff;color:white;border:none;border-radius:6px;cursor:pointer;font-size:15px;width:100%;margin-top:8px}
.error{color:#dc3545;margin:8px 0;font-size:14px}
.info{color:#007bff;margin:8px 0;font-size:14px;text-align:center}
.hide{display:none}
.loading{text-align:center;padding:20px;color:#666}
</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<div class="card">
    <h2>🔐 数据提取系统</h2>
    <div id="loadingSection" class="loading"><p>正在加载数据，请稍候...</p></div>
    <div id="keySection" class="hide">
        <div class="input-group">
            <label>请输入授权卡密</label>
            <input type="text" id="cardKey" placeholder="输入卡密">
            <div class="error" id="keyError"></div>
        </div>
        <button onclick="verifyCard()">验证并进入</button>
    </div>
    <div id="exportSection" class="hide">
        <div class="info" id="cardTip"></div>
        <div class="input-group">
            <label>请输入需要提取的组数（1组=11行）</label>
            <input type="number" id="groupCount" min="1" value="1">
        </div>
        <button onclick="exportData()">立即导出A列数据</button>
        <div class="info" style="margin-top:15px">导出后卡密自动失效</div>
    </div>
</div>

<script>
// 你的文件地址（已修正为纯英文，避免中文编码问题）
const DATA_FILE_URL = "https://xiaoxinnb9898-bot.github.io/xiaoxin/data.xlsx";

// 卡密配置
const CARD_LIST = [
  { key: "TEST10", maxGroups: 10, used: false },
  { key: "TEST500", maxGroups: 500, used: false },
  { key: "TEST1000", maxGroups: 1000, used: false },
  { key: "TEST2000", maxGroups: 2000, used: false },
];

const GROUP_ROW_COUNT = 11;
let allAData = [];
let currentCard = null;

// 页面加载自动读取数据（核心修复：彻底避免类型错误）
window.onload = async function () {
  try {
    // 强制跳过缓存，避免旧文件影响
    const res = await fetch(DATA_FILE_URL + "?t=" + new Date().getTime(), {
      cache: "no-store",
      mode: "cors"
    });
    
    if (!res.ok) {
      throw new Error(`文件加载失败: ${res.status} ${res.statusText}`);
    }
    
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf);
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_json(ws, { header: 1, blankrows: true });
    
    // 🔴 核心修复：强制转字符串 + 类型判断，彻底解决 trim 报错
    allAData = raw
      .map(row => {
        // 把A列的单元格值强制转为字符串，空值兜底为""
        const cellValue = row[0];
        return cellValue === null || cellValue === undefined ? "" : String(cellValue);
      })
      .filter(c => {
        // 只保留非空字符串，彻底避免非字符串调用trim
        return typeof c === "string" && c.trim() !== "";
      });

    // 数据加载成功，显示卡密登录
    document.getElementById("loadingSection").classList.add("hide");
    document.getElementById("keySection").classList.remove("hide");
  } catch (e) {
    console.error("加载错误详情：", e);
    document.getElementById("loadingSection").innerHTML = 
      `<p style="color:red">数据加载失败<br>错误信息：${e.message}<br>请检查文件是否存在</p>`;
  }
};

// 卡密验证逻辑
function verifyCard() {
  const inputKey = document.getElementById("cardKey").value.trim();
  const errorEl = document.getElementById("keyError");
  errorEl.textContent = "";

  // 查找匹配的卡密
  const matchedCard = CARD_LIST.find(card => card.key === inputKey);

  if (!matchedCard) {
    errorEl.textContent = "卡密不存在，请检查输入";
    return;
  }
  if (matchedCard.used) {
    errorEl.textContent = "该卡密已使用，无法重复验证";
    return;
  }

  currentCard = matchedCard;
  // 计算最大可提取组数（数据总量 ÷ 11，取整）
  const maxGroups = Math.min(matchedCard.maxGroups, Math.floor(allAData.length / GROUP_ROW_COUNT));
  document.getElementById("cardTip").textContent = 
    `卡密验证通过！您最多可提取 ${maxGroups} 组数据（每组11行）`;
  document.getElementById("groupCount").max = maxGroups;

  // 切换到导出界面
  document.getElementById("keySection").classList.add("hide");
  document.getElementById("exportSection").classList.remove("hide");
}

// 按组导出A列数据（保留分组空行）
function exportData() {
  if (!currentCard) {
    alert("请先通过卡密验证");
    return;
  }

  const inputGroups = parseInt(document.getElementById("groupCount").value);
  const maxGroups = Math.min(
    currentCard.maxGroups,
    Math.floor(allAData.length / GROUP_ROW_COUNT)
  );

  // 校验输入合法性
  if (isNaN(inputGroups) || inputGroups < 1 || inputGroups > maxGroups) {
    alert(`请输入 1~${maxGroups} 之间的有效组数`);
    return;
  }

  // 截取对应行数的数据
  const exportData = allAData.slice(0, inputGroups * GROUP_ROW_COUNT);

  // 还原分组格式：每组11行后加1个空行
  const finalExportData = [];
  for (let i = 0; i < exportData.length; i++) {
    finalExportData.push([exportData[i]]);
    if ((i + 1) % GROUP_ROW_COUNT === 0 && i !== exportData.length - 1) {
      finalExportData.push([""]);
    }
  }

  // 生成Excel并下载
  const worksheet = XLSX.utils.aoa_to_sheet(finalExportData);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "A列分组数据");
  XLSX.writeFile(workbook, `A列数据_${inputGroups}组.xlsx`);

  // 标记卡密为已使用
  currentCard.used = true;
  alert(`导出成功！已生成 ${inputGroups} 组数据文件，卡密已失效`);
  
  // 禁用输入和按钮，防止重复操作
  document.getElementById("groupCount").disabled = true;
  document.querySelector("#exportSection button").disabled = true;
}
</script>
