<!DOCTYPE html>
<meta charset="UTF-8">
<title>数据提取</title>
<style>
*{box-sizing:border-box}
body{background:#f4f6f8;font-family:微软雅黑;padding:20px}
.box{max-width:500px;margin:30px auto;background:#fff;padding:25px;border-radius:16px}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd}
button{background:#007bff;color:white;border:none}
.red{color:red}
.green{color:green}
.center{text-align:center}
</style>

<div class="box">
  <h2>🔐 数据提取</h2>
  <input id="key" placeholder="输入提取码">
  <input id="num" type="number" value="10" min="1" placeholder="提取数量">
  <div id="msg" class="center"></div>
  <button onclick="get()">提取数据</button>
</div>

<script>
// 你的数据源 TXT
const TXT_URL = "https://xiaoxinnb9898-bot.github.io/xiaoxin/data.txt";

// 这里设置你想要的固定提取码
const FIXED_KEY = "xiaoxin2025";

let allData = [];
let usedData = JSON.parse(localStorage.getItem("used") || "[]");

// 加载你的 TXT 数据库
async function loadData() {
  let res = await fetch(TXT_URL + "?t=" + Math.random());
  let text = await res.text();
  allData = text.split(/\n/).map(i => i.trim()).filter(i => i);
}
loadData();

// 提取并下载 TXT
function get() {
  let key = document.getElementById("key").value.trim();
  let need = parseInt(document.getElementById("num").value) || 1;
  let msg = document.getElementById("msg");

  // 验证提取码
  if (key !== FIXED_KEY) {
    msg.className = "red";
    msg.innerText = "提取码不正确";
    return;
  }

  let available = allData.filter(d => !usedData.includes(d));

  if (available.length === 0) {
    msg.className = "red";
    msg.innerText = "数据已用完，请联系小新";
    return;
  }
  if (need > available.length) {
    msg.className = "red";
    msg.innerText = `仅剩 ${available.length} 条`;
    return;
  }

  let result = available.slice(0, need);
  usedData.push(...result);
  localStorage.setItem("used", JSON.stringify(usedData));

  // 输出 TXT 文件
  let blob = new Blob([result.join("\n")], { type: "text/plain" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "提取数据.txt";
  a.click();

  msg.className = "green";
  msg.innerText = "✅ 提取成功，已下载";
}
</script>
