<style>

let allData = [];
let result = [];

async function loadData() {
  try {
    const r = await fetch(DATA_URL + "?t=" + Date.now());
    const t = await r.text();
    allData = t.split("\n").map(i => i.trim()).filter(i => i);
  } catch (e) {}
  updateRemain();
}

async function updateRemain() {
  try {
    let res = await fetch(`https://gist.githubusercontent.com/xiaoxinnb9898-bot/${GIST_ID}/raw/data.json`);
    let d = await res.json();
    const used = new Set((d.logs || []).flatMap(l => (l.data || "").split("\n").filter(i => i)));
    const remain = allData.filter(x => !used.has(x)).length;
    document.getElementById("remain").innerText = `剩余可用：${remain} 条`;
  } catch (e) {}
}

async function getData() {
  const name = document.getElementById("name").value.trim();
  const key = document.getElementById("key").value.trim();
  const msg = document.getElementById("msg");

  if (!name) { msg.className = "red"; msg.innerText = "❌ 请输入名字"; return; }
  if (!key) { msg.className = "red"; msg.innerText = "❌ 请输入卡密"; return; }
  if (!KAMI_LIST[key]) { msg.className = "red"; msg.innerText = "❌ 卡密无效"; return; }

  try {
    let res = await fetch(`https://gist.githubusercontent.com/xiaoxinnb9898-bot/${GIST_ID}/raw/data.json`);
    let data = await res.json();
    data.logs = data.logs || [];

    // 检查是否用过
    if (data.logs.some(i => i.key === key)) {
      msg.className = "red"; msg.innerText = "❌ 卡密已使用"; return;
    }

    const limit = KAMI_LIST[key];
    const used = new Set(data.logs.flatMap(l => (l.data || "").split("\n").filter(i => i)));
    const ava = allData.filter(d => !used.has(d));

    if (ava.length < limit) {
      msg.className = "red"; msg.innerText = "❌ 数据不足"; return;
    }

    result = ava.slice(0, limit);

    // 写入记录 → 这一步保证你后台能看见！
    data.logs.push({
      name: name,
      key: key,
      count: limit,
      time: new Date().toLocaleString(),
      data: result.join("\n")
    });

    await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: "PATCH",
      headers: { Authorization: `token ${GIST_TOKEN}`, "Content-Type": "application/json" },
      body: JSON.stringify({ files: { "data.json": { content: JSON.stringify(data, null, 2) } } })
    });

    document.getElementById("resultArea").innerText = result.join("\n");
    document.getElementById("resultArea").classList.remove("hide");
    document.getElementById("copyBtn").classList.remove("hide");
    document.getElementById("downloadBtn").classList.remove("hide");
    msg.className = "green";
    msg.innerText = `✅ 提取成功 ${limit} 条`;
    updateRemain();
  } catch (err) {
    msg.className = "red";
    msg.innerText = "❌ 提取失败";
    console.error(err);
  }
}

function copyResult() {
  navigator.clipboard.writeText(result.join("\n")).then(() => alert("复制成功"));
}

function downloadTxt() {
  const blob = new Blob([result.join("\n")], { type: "text/plain;charset=utf-8" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${document.getElementById("name").value || "数据"}.txt`;
  a.click();
}

window.onload = loadData;
