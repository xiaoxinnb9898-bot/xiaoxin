<!DOCTYPE html>
<meta charset="UTF-8">
<title>数据提取系统</title>
<style>
*{box-sizing:border-box}
body{font-family:微软雅黑;background:#f4f6f8;margin:0;padding:20px}
.box{max-width:500px;margin:30px auto;background:#fff;padding:25px;border-radius:16px;box-shadow:0 2px 10px #00000010}
h2{text-align:center;margin-top:0}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ddd}
button{background:#007bff;color:white;border:none;cursor:pointer}
.red{color:red}
.green{color:green}
.center{text-align:center}
</style>

<div class="box">
  <h2>🔐 数据提取</h2>
  <input id="key" placeholder="请输入卡密">
  <input id="count" type="number" value="10" min="1" placeholder="你需要多少条数据">
  <div id="msg" class="center"></div>
  <button onclick="extract()">提取并导出TXT</button>
</div>

<script>
// 共用本地存储，和后台互通
function getKeys() { return JSON.parse(localStorage.getItem("sys_keys")||"[]") }
function getUsedData() { return JSON.parse(localStorage.getItem("sys_used")||"[]") }
function getAllData() {
  let d = localStorage.getItem("sys_all");
  if(d) return JSON.parse(d);
  let arr = [];
  for(let i=1;i<=500;i++) arr.push("数据_"+i);
  localStorage.setItem("sys_all",JSON.stringify(arr));
  return arr;
}
function saveKeys(k) { localStorage.setItem("sys_keys",JSON.stringify(k)) }
function saveUsed(d) { localStorage.setItem("sys_used",JSON.stringify(d)) }

async function extract() {
  const key = document.getElementById("key").value.trim();
  const num = parseInt(document.getElementById("count").value)||1;
  const msg = document.getElementById("msg");

  if(!key){ msg.className="center red"; msg.innerText="请输入卡密"; return; }
  if(num<1){ msg.className="center red"; msg.innerText="至少1条"; return; }

  const keys = getKeys();
  const card = keys.find(x=>x.key===key);

  if(!card){ msg.className="center red"; msg.innerText="卡密不存在"; return; }
  if(card.used){ msg.className="center red"; msg.innerText="卡密已使用"; return; }

  const all = getAllData();
  const used = getUsedData();
  const available = all.filter(x=>!used.includes(x));

  if(available.length===0){
    msg.className="center red";
    msg.innerText="库里没有数据了，请联系小新";
    return;
  }
  if(num>available.length){
    msg.className="center red";
    msg.innerText="剩余不足，请输入更少条数";
    return;
  }

  const take = available.slice(0,num);
  used.push(...take);
  card.used=true;
  saveUsed(used);
  saveKeys(keys);

  const blob = new Blob([take.join("\r\n")],{type:"text/plain"});
  const a = document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="提取数据.txt";
  a.click();

  msg.className="center green";
  msg.innerText="✅ 提取成功！";
}
</script>
