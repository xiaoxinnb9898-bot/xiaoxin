<!DOCTYPE html>
<meta charset="UTF-8">
<title>数据提取系统</title>
<style>
body{max-width:500px;margin:30px auto;padding:20px;font-family:微软雅黑;background:#f2f5f9}
.card{background:#fff;padding:25px;border-radius:16px;box-shadow:0 2px 10px #00000010}
h2{text-align:center;color:#222}
input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px;box-sizing:border-box}
button{width:100%;padding:12px;background:#2962ff;color:white;border:0;border-radius:8px;font-size:16px;margin-top:5px}
.msg{color:red;text-align:center;margin:8px 0}
</style>

<div class="card">
  <h2>🔐 数据提取</h2>
  <input id="key" placeholder="请输入卡密">
  <input id="count" type="number" value="10" min="1">
  <div class="msg" id="msg"></div>
  <button onclick="getData()">立即提取数据</button>
</div>

<script>
const API = "https://your-api-url.com"; // 我会帮你填

async function getData() {
  const key = document.getElementById("key").value;
  const count = parseInt(document.getElementById("count").value);
  
  const res = await fetch(API + "/extract", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ key, count })
  });
  
  const data = await res.json();
  if (!data.success) {
    document.getElementById("msg").innerText = data.msg;
    return;
  }

  const blob = new Blob([data.content], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "提取数据.txt";
  a.click();
  document.getElementById("msg").innerText = "提取成功";
}
</script>
